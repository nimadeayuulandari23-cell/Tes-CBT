<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CBT SMPN 3 UBUD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body oncontextmenu="return false;">
    <div class="bg-blue-900 p-4 text-white shadow-lg sticky top-0 z-50 flex items-center">
        <h1 class="text-xl font-bold">CBT SMPN 3 UBUD</h1>
    </div>

    <div id="app" class="container mx-auto p-4 mt-6">
        <div id="loginPage" class="max-w-md mx-auto bg-white p-8 rounded-2xl shadow-xl">
            <h2 class="text-2xl font-bold mb-6 text-center">Login Siswa/Guru</h2>
            <select id="kelas" class="w-full p-3 mb-4 border rounded-xl">
                <option value="">-- Pilih Kelas --</option>
                <option>9A</option><option>9B</option><option>9C</option>
            </select>
            <input type="text" id="username" placeholder="Username" class="w-full p-3 mb-4 border rounded-xl">
            <input type="password" id="password" placeholder="Password" class="w-full p-3 mb-6 border rounded-xl">
            <button onclick="auth('siswa')" class="w-full bg-blue-600 text-white p-3 rounded-xl font-bold mb-2">MASUK SISWA</button>
        </div>

        <div id="examPage" class="hidden grid grid-cols-12 gap-6">
            <div class="col-span-9 bg-white p-6 rounded-2xl shadow-lg">
                <div class="flex justify-between border-b pb-4 mb-4">
                    <span id="noSoal" class="font-bold text-lg"></span>
                    <span id="timer" class="text-red-600 font-bold text-lg"></span>
                </div>
                <div id="soalBox" class="min-h-[300px]"></div>
                <div class="flex justify-between mt-6">
                    <button id="prev" onclick="nav(-1)" class="bg-gray-200 px-6 py-2 rounded-lg">Kembali</button>
                    <button id="next" onclick="nav(1)" class="bg-blue-600 text-white px-6 py-2 rounded-lg">Lanjut</button>
                    <button id="finish" onclick="selesai()" class="hidden bg-green-600 text-white px-6 py-2 rounded-lg">Selesai</button>
                </div>
            </div>
            <div class="col-span-3 bg-white p-4 rounded-2xl shadow-lg h-fit">
                <h3 class="text-center font-bold mb-4">Nomor Soal</h3>
                <div id="petaSoal" class="flex flex-wrap gap-2 justify-center"></div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
